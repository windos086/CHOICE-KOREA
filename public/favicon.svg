<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Rounded White Badge to ensure perfect visibility on both Dark & Light browser tabs -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#ffffff" />
  
  <!-- Premium Blue 'C' emblem curve -->
  <!-- Center is at 64,69, radius is 34, sweeping from top-right down & around to bottom-right -->
  <path d="M 88 38 A 34 34 0 1 0 88 88" 
        stroke="#123c6d" 
        stroke-width="15" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Choice Korea Core Red checkmark -->
  <path d="M 46 64 L 56 74 L 98 32" 
        stroke="#d11822" 
        stroke-width="15" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
